name: Build and Deploy Bookdown

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev pandoc pandoc-citeproc
        
      - name: Install R packages
        run: |
          R -e 'install.packages("bookdown")'
          R -e 'install.packages(c("tidyverse", "forecast", "ggplot2", "gridExtra", "zoo"))'
      
      - name: Build Bookdown
        run: |
          R -e 'bookdown::render_book("index.Rmd")'
      
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_book
